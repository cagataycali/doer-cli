<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- doer: minimalist pipe-duck -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD43B"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
  </defs>

  <!-- pipe (the | symbol, doer's unix philosophy) -->
  <rect x="18" y="40" width="6" height="120" rx="2" fill="#2C2C2C" opacity="0.85"/>
  <rect x="176" y="40" width="6" height="120" rx="2" fill="#2C2C2C" opacity="0.85"/>

  <!-- stdin arrow -->
  <path d="M 30 100 L 55 100" stroke="#2C2C2C" stroke-width="3" stroke-linecap="round"/>
  <path d="M 48 93 L 58 100 L 48 107" fill="none" stroke="#2C2C2C" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- stdout arrow -->
  <path d="M 145 100 L 170 100" stroke="#2C2C2C" stroke-width="3" stroke-linecap="round"/>
  <path d="M 163 93 L 173 100 L 163 107" fill="none" stroke="#2C2C2C" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- duck body (egg shape) -->
  <ellipse cx="100" cy="108" rx="42" ry="38" fill="url(#bodyGrad)" stroke="#2C2C2C" stroke-width="2.5"/>

  <!-- wing -->
  <path d="M 85 110 Q 105 95 125 112 Q 115 125 100 124 Q 88 122 85 110 Z"
        fill="#E89A1A" stroke="#2C2C2C" stroke-width="2" stroke-linejoin="round"/>

  <!-- head -->
  <circle cx="100" cy="70" r="26" fill="url(#bodyGrad)" stroke="#2C2C2C" stroke-width="2.5"/>

  <!-- eye -->
  <circle cx="108" cy="64" r="5" fill="#2C2C2C"/>
  <circle cx="110" cy="62" r="1.6" fill="#fff"/>

  <!-- beak -->
  <path d="M 120 72 Q 135 72 135 78 Q 135 82 120 80 Z"
        fill="#FF8C42" stroke="#2C2C2C" stroke-width="2" stroke-linejoin="round"/>

  <!-- feet -->
  <path d="M 85 144 L 80 154 M 85 144 L 88 154 M 85 144 L 92 154"
        stroke="#FF8C42" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M 115 144 L 110 154 M 115 144 L 118 154 M 115 144 L 122 154"
        stroke="#FF8C42" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
