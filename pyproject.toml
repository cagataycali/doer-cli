[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "doer"
version = "0.0.1"
description = "doer — one-file pipe-native agent. strands-agents only."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["strands-agents"]
authors = [{name = "cagataycali"}]
license = {text = "Apache-2.0"}

[project.urls]
Homepage = "https://github.com/cagataycali/doer"

[project.scripts]
doer = "doer:cli"

[tool.setuptools.packages.find]
where = ["."]
include = ["doer*"]
