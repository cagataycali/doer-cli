name: Release binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-13       # intel
            name: darwin-x86_64
          - os: macos-14       # apple silicon
            name: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13' }
      - run: pip install pyinstaller strands-agents
      - name: build
        run: |
          pyinstaller --onefile --name doer-${{ matrix.name }} \
            --clean --noconfirm \
            --add-data "doer/__init__.py:doer" \
            --collect-all strands \
            doer/__init__.py
      - uses: actions/upload-artifact@v4
        with:
          name: doer-${{ matrix.name }}
          path: dist/doer-${{ matrix.name }}*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/doer-*
