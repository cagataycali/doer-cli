name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # --- PyInstaller binaries (fast, all platforms) ---
  pyinstaller:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            use_upx: true
          - os: macos-13
            name: darwin-x86_64
            use_upx: false  # UPX breaks mach-o signatures
          - os: macos-14
            name: darwin-arm64
            use_upx: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13' }

      - name: Install UPX (Linux only)
        if: matrix.use_upx
        run: sudo apt-get update && sudo apt-get install -y upx

      - run: pip install pyinstaller strands-agents

      - name: Build with PyInstaller
        run: |
          UPX_FLAG=""
          if [ "${{ matrix.use_upx }}" = "true" ]; then
            UPX_FLAG="--upx-dir=$(dirname $(which upx))"
          fi
          pyinstaller --onefile --name doer-${{ matrix.name }} \
            --clean --noconfirm --strip $UPX_FLAG \
            --add-data "doer/__init__.py:doer" \
            --collect-all strands \
            doer/__init__.py

      - uses: actions/upload-artifact@v4
        with:
          name: doer-${{ matrix.name }}
          path: dist/doer-${{ matrix.name }}*

  # --- PyPI publish (on tags only) ---
  pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13' }
      - run: pip install build twine
      - run: python -m build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*.whl dist/*.tar.gz

  # --- GitHub Release (collects all artifacts) ---
  release:
    needs: [pyinstaller]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/doer-*
          generate_release_notes: true
