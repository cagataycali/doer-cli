site_name: doer
site_url: https://doer.duck.nyc
site_description: "One-file pipe-native minimalist AI agent. strands-agents only. ~100 LOC."
repo_url: https://github.com/cagataycali/doer
repo_name: cagataycali/doer

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - Guide:
    - Pipe-Native: guide/pipe-native.md
    - Self-Aware: guide/self-aware.md
    - Hot Reload Tools: guide/hot-reload.md
    - History: guide/history.md
    - Standalone Binary: guide/binary.md
  - Examples: examples.md
  - Architecture: architecture.md

theme:
  name: material
  logo: doer.svg
  favicon: doer.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: white
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.betterem
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji ''
      emoji_generator: !!python/name:material.extensions.emoji.to_svg ''
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - toc:
      permalink: true

plugins:
  - search
